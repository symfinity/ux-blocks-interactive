role: collapsible
twig_name: Collapsible
requires_stimulus: true
groups:
  - id: states
    section: States
    layout: inline-row
    items:
      - id: closed
        label: Closed
        props:
          defaultOpen: false
        slot_twig: |
          <twig:Collapsible:Trigger>Shipping options</twig:Collapsible:Trigger>
          <twig:Collapsible:Content>Free delivery on orders over €50.</twig:Collapsible:Content>
      - id: open
        label: Open
        props:
          defaultOpen: true
        slot_twig: |
          <twig:Collapsible:Trigger>Shipping options</twig:Collapsible:Trigger>
          <twig:Collapsible:Content>Free delivery on orders over €50.</twig:Collapsible:Content>
      - id: controlled
        label: "Controlled (core Stimulus)"
        props:
          open: true
        slot_twig: |
          <twig:Collapsible:Trigger>Billing</twig:Collapsible:Trigger>
          <twig:Collapsible:Content>Invoice history loads here.</twig:Collapsible:Content>
