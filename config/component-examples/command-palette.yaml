role: command-palette
twig_name: CommandPalette
requires_stimulus: true
groups:
  - id: examples
    section: Examples
    layout: stack
    items:
      - id: fallback
        label: "Static commands"
        props: {}
        slot_twig: |
          <twig:CommandPalette placeholder="{{ lorem_words(2) }}">
              <twig:CommandPalette:Input />
              <twig:CommandPalette:List>
                  <twig:CommandPalette:Item icon="home">{{ lorem_words(2)|capitalize }}</twig:CommandPalette:Item>
                  <twig:CommandPalette:Item icon="settings">{{ lorem_words(2)|capitalize }}</twig:CommandPalette:Item>
              </twig:CommandPalette:List>
          </twig:CommandPalette>
