  - id: right
    title: Right auxiliary panel
    section: Placement
    props:
      side: right
    slot_twig: |
      <twig:Sidebar side="right">
          <twig:Sidebar:Trigger>Help</twig:Sidebar:Trigger>
          <twig:Sidebar:Content>Contextual help links</twig:Sidebar:Content>
      </twig:Sidebar>
