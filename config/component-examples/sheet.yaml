role: sheet
twig_name: Sheet
requires_stimulus: true
groups:
  - id: examples
    section: Examples
    layout: stack
    items:
      - id: right
        label: "Edit panel"
        props: {}
        slot_twig: |
          <twig:Sheet side="right">
              <twig:Sheet:Trigger>Edit profile</twig:Sheet:Trigger>
              <twig:Sheet:Content>
                  <twig:Sheet:Header>
                      <twig:Sheet:Title>Profile</twig:Sheet:Title>
                      <twig:Sheet:Close />
                  </twig:Sheet:Header>
                  Update your details.
              </twig:Sheet:Content>
          </twig:Sheet>
  - id: placement
    section: Placement
    layout: stack
    items:
      - id: left
        label: "Left panel"
        props: {}
        slot_twig: |
          <twig:Sheet side="left">
              <twig:Sheet:Trigger>Details</twig:Sheet:Trigger>
              <twig:Sheet:Content>Supporting information</twig:Sheet:Content>
          </twig:Sheet>
