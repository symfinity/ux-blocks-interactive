role: sheet
twig_name: Sheet
requires_stimulus: true
examples:
  - id: right
    title: Edit panel
    section: Examples
    props:
      side: right
    slot_twig: |
      <twig:Sheet side="right">
          <twig:Sheet:Trigger>Edit profile</twig:Sheet:Trigger>
          <twig:Sheet:Content>
              <twig:Sheet:Header>
                  <twig:Sheet:Title>Profile</twig:Sheet:Title>
                  <twig:Sheet:Close />
              </twig:Sheet:Header>
              Update your details.
          </twig:Sheet:Content>
      </twig:Sheet>
  - id: left
    title: Left panel
    section: Placement
    props:
      side: left
    slot_twig: |
      <twig:Sheet side="left">
          <twig:Sheet:Trigger>Details</twig:Sheet:Trigger>
          <twig:Sheet:Content>Supporting information</twig:Sheet:Content>
      </twig:Sheet>
