role: tree-view
twig_name: TreeView
requires_stimulus: true
groups:
  - id: browse
    section: Examples
    layout: stack
    items:
      - id: selectable-tree
        label: "Selectable tree"
        props:
          expanded: "['src']"
          label: "Project files"
          nodes: "[{'id': 'src', 'label': 'src', 'children': [{'id': 'readme', 'label': 'README.md'}, {'id': 'kernel', 'label': 'Kernel.php'}]}, {'id': 'docs', 'label': 'docs', 'children': []}]"
          selectable: true
          selected: readme
