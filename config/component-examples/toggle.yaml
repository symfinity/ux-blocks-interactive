role: toggle
twig_name: Toggle
requires_stimulus: true
groups:
  - id: variants
    section: Variants
    layout: inline-row
    items:
      - id: primary-off
        label: Primary
        props: { variant: primary, pressed: false }
        slot_text: Bold
      - id: secondary-on
        label: Secondary pressed
        props: { variant: secondary, pressed: true }
        slot_text: Italic
      - id: outline-off
        label: Outline
        props: { variant: outline, pressed: false }
        slot_text: Underline
