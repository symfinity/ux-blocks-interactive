role: toggle
twig_name: Toggle
requires_stimulus: true
groups:
  - id: variants
    section: Variants
    layout: inline-row
    items:
      - id: primary-off
        label: Primary
        props:
          pressed: false
          variant: primary
        slot_text: Bold
      - id: secondary-on
        label: "Secondary pressed"
        props:
          pressed: true
          variant: secondary
        slot_text: Italic
      - id: outline-off
        label: Outline
        props:
          pressed: false
          variant: outline
        slot_text: Underline
