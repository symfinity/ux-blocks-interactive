role: hover-card
twig_name: HoverCard
requires_stimulus: true
groups:
  - id: examples
    section: Examples
    layout: inline-row
    items:
      - id: basic
        label: "Profile preview"
        props: {}
        slot_twig: |
          <twig:HoverCard>
              <twig:HoverCard:Trigger href="#">@alice</twig:HoverCard:Trigger>
              <twig:HoverCard:Content>
                  <strong>Alice Chen</strong>
                  <p>Design systems</p>
              </twig:HoverCard:Content>
          </twig:HoverCard>
  - id: behavior
    section: Behavior
    layout: inline-row
    items:
      - id: slow-open
        label: "Delayed open"
        props: {}
        slot_twig: |
          <twig:HoverCard openDelay="400" closeDelay="150">
              <twig:HoverCard:Trigger href="#">Hover me</twig:HoverCard:Trigger>
              <twig:HoverCard:Content>Preview appears after 400ms</twig:HoverCard:Content>
          </twig:HoverCard>
