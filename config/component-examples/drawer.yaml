role: drawer
twig_name: Drawer
requires_stimulus: true
examples:
  - id: bottom
    title: Bottom sheet
    section: Examples
    props:
      side: bottom
    slot_twig: |
      <twig:Drawer side="bottom">
          <twig:Drawer:Trigger>View cart</twig:Drawer:Trigger>
          <twig:Drawer:Content>
              <twig:Drawer:Header>
                  <twig:Drawer:Title>Your cart</twig:Drawer:Title>
                  <twig:Drawer:Close />
              </twig:Drawer:Header>
              2 items
          </twig:Drawer:Content>
      </twig:Drawer>
  - id: left
    title: Left edge
    section: Placement
    props:
      side: left
    slot_twig: |
      <twig:Drawer side="left">
          <twig:Drawer:Trigger>Filters</twig:Drawer:Trigger>
          <twig:Drawer:Content>
              <twig:Drawer:Title>Filters</twig:Drawer:Title>
          </twig:Drawer:Content>
      </twig:Drawer>
