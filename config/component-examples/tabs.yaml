role: tabs
twig_name: Tabs
requires_stimulus: true
groups:
  - id: examples
    section: Examples
    layout: stack
    items:
      - id: horizontal
        label: "Account settings"
        props: {}
        slot_twig: |
          <twig:Tabs defaultValue="account">
              <twig:Tabs:List>
                  <twig:Tabs:Trigger value="account" active>{{ lorem_words(1)|capitalize }}</twig:Tabs:Trigger>
                  <twig:Tabs:Trigger value="billing">{{ lorem_words(1)|capitalize }}</twig:Tabs:Trigger>
              </twig:Tabs:List>
              <twig:Tabs:Content value="account" active>{{ lorem_sentence() }}</twig:Tabs:Content>
              <twig:Tabs:Content value="billing">{{ lorem_sentence() }}</twig:Tabs:Content>
          </twig:Tabs>
  - id: orientation
    section: Orientation
    layout: stack
    items:
      - id: vertical
        label: "Vertical tabs"
        props: {}
        slot_twig: |
          <twig:Tabs defaultValue="general" orientation="vertical">
              <twig:Tabs:List>
                  <twig:Tabs:Trigger value="general" active>{{ lorem_words(1)|capitalize }}</twig:Tabs:Trigger>
                  <twig:Tabs:Trigger value="security">{{ lorem_words(1)|capitalize }}</twig:Tabs:Trigger>
              </twig:Tabs:List>
              <twig:Tabs:Content value="general" active>{{ lorem_sentence() }}</twig:Tabs:Content>
              <twig:Tabs:Content value="security">{{ lorem_sentence() }}</twig:Tabs:Content>
          </twig:Tabs>
