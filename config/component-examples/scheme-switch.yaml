role: scheme-switch
twig_name: SchemeSwitch
requires_stimulus: true
groups:
  - id: examples
    section: Examples
    layout: inline-row
    items:
      - id: light
        label: "Light mode"
        props: {}
        slot_twig: |
          <twig:SchemeSwitch label="{{ lorem_words(2)|capitalize }}" scheme="light" colorScheme="light" />
  - id: states
    section: States
    layout: inline-row
    items:
      - id: dark
        label: "Dark mode"
        props: {}
        slot_twig: |
          <twig:SchemeSwitch label="{{ lorem_words(2)|capitalize }}" scheme="dark" colorScheme="dark" />
