role: slider
twig_name: Slider
requires_stimulus: true
groups:
  - id: variants
    section: Variants
    layout: inline-row
    items:
      - id: primary
        label: Primary
        props: { variant: primary, min: 0, max: 100, step: 1, value: 40 }
      - id: secondary
        label: Secondary
        props: { variant: secondary, min: 0, max: 100, step: 1, value: 50 }
      - id: outline
        label: Outline
        props: { variant: outline, min: 0, max: 100, step: 1, value: 60 }
  - id: range
    section: Range
    layout: inline-row
    items:
      - id: narrow-range
        label: 0–10 step 1
        props: { variant: primary, min: 0, max: 10, step: 1, value: 7 }
      - id: wide-range
        label: 0–200 step 10
        props: { variant: primary, min: 0, max: 200, step: 10, value: 120 }
