role: stacked-layout-interactive
twig_name: StackedLayoutInteractive
requires_stimulus: true
groups:
  - id: settings
    section: Examples
    layout: stack
    items:
      - id: overview-billing
        label: "Overview + billing"
        props:
          defaultPanel: overview
        slot_twig: |
          <twig:StackedLayoutInteractive:Nav>
              <twig:StackedLayoutInteractive:NavItem panel="overview">Overview</twig:StackedLayoutInteractive:NavItem>
              <twig:StackedLayoutInteractive:NavItem panel="billing">Billing</twig:StackedLayoutInteractive:NavItem>
          </twig:StackedLayoutInteractive:Nav>
          <twig:StackedLayoutInteractive:Panel panel="overview">Account summary</twig:StackedLayoutInteractive:Panel>
          <twig:StackedLayoutInteractive:Panel panel="billing">Invoices and payment methods</twig:StackedLayoutInteractive:Panel>
